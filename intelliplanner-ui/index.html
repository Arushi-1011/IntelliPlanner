<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliPlanner</title>
    <link rel="stylesheet" href="home_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>hi 🌷</h1>
        </header>
        <div class="input-card">
            <input type="text" placeholder="what's on your mind today?">
        </div>
        <div class="plan-card">
            <h2>here's a gentle plan for today 🤍</h2>
            <ul>
                <li>DSA - graphs</li>
                <li>Web dev practice</li>
                <li>Revise java</li>
            </ul>
        </div>
        <div class="later-card">
            <h2>not today, and that's okay</h2>
            <p>extra tasks can rest here</p>
        </div>
    </main>
</body>
</html>
